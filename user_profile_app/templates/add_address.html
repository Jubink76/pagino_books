{% extends 'base.html' %}
{% load static %}

{% block css_link %}
<style>
    /* Keeping existing account-management styles */
    .account-management {
        font-family: Arial, sans-serif;
    }

    /* Previous styles remain the same until .main-content */
    .account-management .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .account-management .breadcrumb {
        margin-bottom: 30px;
        font-size: 16px;
    }

    .account-management .breadcrumb a {
        color: #007bff;
        text-decoration: none;
    }

    .account-management .breadcrumb span {
        color: #6c757d;
        margin: 0 10px;
    }

    .account-management .content-wrapper {
        display: flex;
        gap: 30px;
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .account-management .sidebar {
        width: 300px;
        background: #f8f9fa;
        border-radius: 8px;
        padding: 25px;
    }

    .account-management .sidebar h2 {
        font-size: 24px;
        margin-bottom: 25px;
        color: #333;
    }

    .account-management .nav-list {
        list-style: none;
        padding: 0;
    }

    .account-management .nav-item {
        margin-bottom: 15px;
    }

    .account-management .nav-link {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        text-decoration: none;
        color: #495057;
        border-radius: 6px;
        font-size: 16px;
    }

    .account-management .nav-link.active {
        background-color: #007bff;
        color: white;
    }

    .account-management .nav-link:hover:not(.active) {
        background-color: #e9ecef;
    }

    .account-management .nav-icon {
        margin-right: 12px;
        width: 24px;
        font-size: 20px;
    }

    .account-management .main-content {
        flex: 1;
        padding: 0 20px;
    }

    /* New styles for address book */
    .address-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
    }

    .address-header h1 {
        font-size: 28px;
        color: #333;
        margin: 0;
    }

    .btn-add-address {
        background-color: #dc3545;
        color: white;
        padding: 12px 24px;
        border-radius: 6px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
    }

    .empty-address {
        text-align: center;
        padding: 60px 20px;
    }

    .empty-address img {
        width: 200px;
        height: 200px;
        margin-bottom: 30px;
    }

    .empty-address h2 {
        font-size: 24px;
        color: #333;
        margin-bottom: 15px;
    }

    .empty-address p {
        color: #6c757d;
        font-size: 16px;
        margin-bottom: 30px;
    }

    .btn-explore {
        background-color: #dc3545;
        color: white;
        padding: 12px 30px;
        border-radius: 6px;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
    }

    @media (max-width: 992px) {
        .account-management .content-wrapper {
            flex-direction: column;
        }

        .account-management .sidebar {
            width: 100%;
        }

        .address-header {
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }
    }
    .form-header {
        margin-bottom: 30px;
    }

    .form-header h1 {
        font-size: 24px;
        color: #333;
        margin: 0;
    }

    .address-type-selector {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
    }

    .type-option {
        flex: 1;
        padding: 15px;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        background: white;
        transition: all 0.3s ease;
    }

    .type-option.active {
        border-color: #dc3545;
        background-color: #fff1f2;
    }

    .type-option i {
        font-size: 24px;
        margin-bottom: 8px;
        display: block;
    }

    .address-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .form-row {
        display: flex;
        gap: 20px;
    }

    .form-group {
        flex: 1;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #dee2e6;
        border-radius: 6px;
        font-size: 16px;
    }

    .form-group input:focus {
        outline: none;
        border-color: #dc3545;
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 20px;
    }

    .btn-cancel {
        padding: 12px 24px;
        border: 1px solid #dee2e6;
        border-radius: 6px;
        background: white;
        color: #666;
        cursor: pointer;
    }

    .btn-save {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        background: #ffc107;
        color: #000000;
        cursor: pointer;
    }

    .btn-save:hover {
        background: #c82333;
    }

    @media (max-width: 768px) {
        .form-row {
            flex-direction: column;
            gap: 15px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="account-management">
    <div class="container">
        <div class="breadcrumb">
            <a href="{% url 'homepage_after_login' %}">Home</a>
            <span>/</span>
            <span>My Account</span>
        </div>

        <div class="content-wrapper">
            <div class="sidebar">
                <h2>Manage Account</h2>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="{% url 'user_profile' %}" class="nav-link">
                            <span class="nav-icon">👤</span>
                            My Profile
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'user_address' %}" class="nav-link active">
                            <span class="nav-icon">📖</span>
                            Address Book
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'user_orders' %}" class="nav-link">
                            <span class="nav-icon">🛍️</span>
                            My Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <span class="nav-icon">💳</span>
                            Payment Options
                        </a>
                    </li>
                </ul>
            </div>

            <div class="main-content">
                <div class="form-header">
                    <h1>Add New Address</h1>
                </div>

                <form class="address-form">
                    <div class="address-type-selector">
                        <div class="type-option active">
                            <i>🏠</i>
                            <div>Home</div>
                        </div>
                        <div class="type-option">
                            <i>🏢</i>
                            <div>Office</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>Street Address</label>
                        <input type="text" placeholder="Enter your street address">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Apartment/Suite</label>
                            <input type="text" placeholder="Enter apartment or suite number">
                        </div>
                        <div class="form-group">
                            <label>Landmark</label>
                            <input type="text" placeholder="Enter nearby landmark">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" placeholder="Enter city">
                        </div>
                        <div class="form-group">
                            <label>Postal Code</label>
                            <input type="text" placeholder="Enter postal code">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="Enter phone number">
                    </div>

                    <div class="form-actions">
                        <a href="{% url 'user_address' %}"><button type="button" class="btn-cancel">Cancel</button></a>
                        <button type="submit" class="btn-save">Save Address</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Add click handlers for address type selection
    document.querySelectorAll('.type-option').forEach(option => {
        option.addEventListener('click', () => {
            document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('active'));
            option.classList.add('active');
        });
    });
</script>
{% endblock %}
