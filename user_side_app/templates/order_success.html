{% extends 'base.html' %}
{% load static %}

{% block css_link %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
  body {
    height: 100vh;
    background-color: #f5f5f5;
  }

  .panel {
    max-width: 500px;
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
  }

  .panel-body {
    padding: 40px;
    text-align: center;
  }

  .order-confirmation-image {
    max-width: 200px;
    margin-bottom: 20px;
  }

  .text-success {
    color: #28a745 !important;
    font-size: 36px;
    font-weight: bold;
  }

  .btn-group .btn {
    border-radius: 25px;
    padding: 10px 25px;
  }

  .btn-primary {
    background-color: #007bff;
    border-color: #007bff;
  }

  .btn-default {
    background-color: #fff;
    border-color: #ccc;
    color: #333;
  }
</style>
{% endblock %}

{% block content %}
<body>
  <div class="panel panel-default">
    <div class="panel-body">
      <img src="{% static 'user/images/logo/success.jpg' %}" alt="Order Confirmation" class="order-confirmation-image">
      <h2 class="text-success mb-3">Order Confirmed</h2>
      <p>Thank you for your purchase!</p>
      <p>Your order has been placed and is being processed.</p>
      <div class="btn-group mt-4">
        <a href="" class="btn btn-default">
          <i class="fa fa-list"></i> View Order
        </a>
        <a href="" class="btn btn-primary">
          <i class="fa fa-shopping-bag"></i> Continue Shopping
        </a>
      </div>
    </div>
  </div>
</body>
{% endblock %}

{% block script %}
{% endblock %}
