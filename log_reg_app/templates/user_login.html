{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="{% static 'user/css/user_login.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
</head>
<body>
{% if messages %}
    <div id="message-container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        {% endfor %}
    </div>
{% endif %}
<div class="login-container mt-5">
    <div class="login-form">
        <div class="back_container">
            <a href="{% url 'homepage_before_login' %}" class="btn">
                
                <i class="bi bi-arrow-left"></i>
                Back to home
            </a>
        </div>
        <h1>Login Here</h1>
        <h2>Welcome !!!</h2>
        <form action="{% url 'user_login' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>  
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="remember" name="remember">
                        Remember me
                    </label>
                </div>
                <div>    
                    <a href="{% url 'forgot_password' %}" class="forgot-password">Forgot Password</a>
                </div>   
            <button type="submit" class="btn-signin">SIGN IN</button>
        </form>
        <div class="signup-link">
            Don't have an account? <a href="{% url 'user_signup' %}">Sign up</a>
        </div>
        <div class="social-login">
            <a href="{% provider_login_url 'google' %}?next={% url 'homepage_after_login' %}" class="btn btn-danger d-flex align-items-center justify-content-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google me-2" viewBox="0 0 16 16">
                    <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.643a4.356 4.356 0 0 0-4.355 4.356c0 2.412 1.959 4.355 4.355 4.355 2.004 0 3.71-1.46 4.222-3.54H8v-2.66h7.545z"/>
                </svg>
                Login with Google
            </a>
        </div>
    </div>
    <img src="{% static 'user/images/logo/login_image.png' %}" alt="Login" class="login-image">
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Hide the message after 3 seconds
    setTimeout(function() {
        const messageContainer = document.getElementById('message-container');
        if (messageContainer) {
            messageContainer.style.display = 'none';
        }
    }, 3000);  // 3000 milliseconds = 3 seconds
</script>
</body>
</html>
