{% extends 'admin_base.html' %}
{% load static %}

{% block csslink %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="col-md-9 ms-sm-auto col-lg-10 offset-md-3 offset-lg-2">
    <div class="bg-gray-800 rounded-lg shadow-lg p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-white text-2xl font-medium">View User</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="#" class="text-gray-400 hover:text-gray-300">Admin</a></li>
                    <li class="breadcrumb-item"><a href="{% url 'admin_users' %}" class="text-gray-400 hover:text-gray-300">Users</a></li>
                    <li class="breadcrumb-item active text-gray-300" aria-current="page">View User</li>
                </ol>
            </nav>
        </div>

        <form method="POST" action="{% url 'view_users' record.id  %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Left Column -->
                <div>
                    <div class="mb-6">
                        <label class="block text-gray-300 font-medium mb-2">First Name</label>
                        <input type="text" name="first_name" 
                               class="bg-gray-700 text-gray-300 rounded-md px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               value="{{record.first_name}}">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-300 font-medium mb-2">Username</label>
                        <input type="text" name="username" 
                               class="bg-gray-700 text-gray-300 rounded-md px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               value="{{record.username}}">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-300 font-medium mb-2">Gender</label>
                        <input type="text" name="gender" 
                               class="bg-gray-700 text-gray-300 rounded-md px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               value="{{record.gender}}">
                    </div>
                </div>
        
                <!-- Right Column -->
                <div>
                    <div class="mb-6">
                        <label class="block text-gray-300 font-medium mb-2">Last Name</label>
                        <input type="text" name="last_name" 
                               class="bg-gray-700 text-gray-300 rounded-md px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               value="{{record.last_name}}">
                    </div>
        
                    <div class="mb-6">
                        <label class="block text-gray-300 font-medium mb-2">Email</label>
                        <input type="email" name="email" 
                               class="bg-gray-700 text-gray-300 rounded-md px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               value="{{record.email}}">
                    </div>
        
                    <div class="mb-6">
                        <label class="block text-gray-300 font-medium mb-2">Phone Number</label>
                        <input type="tel" name="phone_number" 
                               class="bg-gray-700 text-gray-300 rounded-md px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               value="{{record.phone_number}}">
                    </div>
                </div>
            </div>
    
            <!-- Action Buttons -->
            <div class="flex justify-end space-x-4 mt-6">
                <a href="{% url 'admin_users' %}">
                    <button type="button" class="bg-gray-600 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500">
                        Back
                    </button>
                </a>
                <button type="submit" class="{% if record.is_blocked %}bg-green-500 hover:bg-green-600{% else %}bg-red-500 hover:bg-red-600{% endif %} text-white font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
                    {% if record.is_blocked %}
                        Unblock
                    {% else %}
                        Block
                    {% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
